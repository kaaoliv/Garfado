<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Garfado</title>
<link rel="icon" href="data:image/svg+xml,<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'><rect width='100' height='100' rx='22' fill='%230f1117'/><line x1='50' y1='10' x2='50' y2='58' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><line x1='30' y1='10' x2='30' y2='34' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><line x1='70' y1='10' x2='70' y2='34' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><path d='M30 34 Q50 52 70 34' fill='none' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><line x1='50' y1='58' x2='50' y2='88' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><circle cx='50' cy='73' r='12' fill='%234ade80'/></svg>"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="description" content="Garfado — marque os restaurantes que você já foi"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#4ade80;--bg:#0f1117;--s1:#1c2228;--s2:#242c35;--text:#e8eaed;--muted:#99aabb;--faint:#2a3a4a;--gold:#FFC72C}
html,body{height:100%;background:#0a0d10;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.shell{width:100%;max-width:390px;background:var(--bg);border-radius:32px;border:4px solid var(--s1);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 32px);max-height:780px;position:relative;box-shadow:0 32px 80px rgba(0,0,0,.6)}
@media(max-width:430px){body{padding:0;align-items:stretch}.shell{max-width:100%;border-radius:0;border:none;height:100vh;max-height:none}}

.notch{width:80px;height:20px;background:var(--s1);border-radius:0 0 14px 14px;margin:0 auto;flex-shrink:0}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 6px;border-bottom:.5px solid var(--faint);flex-shrink:0}
.logo-row{display:flex;align-items:center;gap:8px}
.logo-svg{width:18px;height:26px}
.wm{font-family:Georgia,serif;font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.topbar-right{display:flex;align-items:center;gap:8px}
.last-time{font-size:9px;color:var(--faint)}
.reload-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:17px;padding:4px 6px;border-radius:6px;line-height:1;transition:all .15s}
.reload-btn:hover{color:var(--text);background:var(--s2)}
.reload-btn.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ver{font-size:9px;color:var(--faint);background:var(--s2);padding:2px 8px;border-radius:99px;border:.5px solid var(--faint)}

/* SEARCH BAR */
.search-wrap{padding:8px 12px;border-bottom:.5px solid var(--faint);flex-shrink:0;position:relative}
.search-input{width:100%;background:var(--s2);border:.5px solid var(--faint);border-radius:10px;padding:8px 36px 8px 34px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--green)}
.search-input::placeholder{color:var(--faint)}
.search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:15px;pointer-events:none}
.search-clear{position:absolute;right:22px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--faint);font-size:16px;padding:2px;line-height:1;display:none}
.search-clear.show{display:block}

/* BOTTOM NAV */
.bnav{display:flex;border-top:.5px solid var(--faint);background:var(--bg);flex-shrink:0}
.bntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 10px;background:none;border:none;cursor:pointer;transition:all .15s;border-top:2px solid transparent;margin-top:-1px}
.bnico{font-size:18px;color:var(--faint)}
.bnlbl{font-size:7px;color:var(--faint);letter-spacing:.3px}
.bntab.on{border-top-color:var(--green)}
.bntab.on .bnico,.bntab.on .bnlbl{color:var(--green)}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px}
.loading-txt{font-size:13px;color:var(--muted)}
.loading-dots::after{content:"...";animation:dots 1.2s steps(4,end) infinite}
@keyframes dots{0%,20%{content:"."}40%{content:".."}60%,100%{content:"..."}}

.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll-body::-webkit-scrollbar{display:none}

.sec-head{padding:1rem 1rem .5rem;display:flex;align-items:baseline;justify-content:space-between}
.sec-title{font-family:Georgia,serif;font-size:15px;font-weight:700;color:var(--text)}
.sec-sub{font-size:10px;color:var(--muted)}

.stats-row{display:flex;gap:8px;padding:0 1rem .75rem;overflow-x:auto}
.stats-row::-webkit-scrollbar{display:none}
.stat-pill{background:var(--s2);border-radius:12px;padding:8px 12px;flex-shrink:0;text-align:center;min-width:64px}
.stat-pill-v{font-size:18px;font-weight:500;color:var(--text)}
.stat-pill-l{font-size:9px;color:var(--muted);margin-top:1px}

/* POSTER GRID */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:0 3px 3px}
.pw{position:relative;aspect-ratio:2/3;cursor:pointer;border-radius:5px;overflow:hidden;transition:opacity .15s}
.pw:active{opacity:.75}
.pw svg{width:100%;height:100%;display:block}
.pw img.poster-img{width:100%;height:100%;object-fit:cover;display:block}
.pvc{position:absolute;top:5px;right:5px;background:var(--green);color:#0f1117;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pvn{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,.8);color:var(--gold);font-size:9px;padding:1px 5px;border-radius:99px}
.pmr{position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,.8);color:var(--gold);font-size:9px;padding:1px 5px;border-radius:99px}
/* overlay de nome no poster com imagem */
.pw-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,transparent 100%);padding:20px 6px 6px;pointer-events:none}
.pw-label-name{font-size:10px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SEARCH RESULTS */
.search-results{padding:0 3px}
.search-item{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:4px}
.search-item:hover,.search-item:active{background:var(--s2)}
.search-thumb{width:36px;height:54px;border-radius:4px;overflow:hidden;flex-shrink:0;position:relative}
.search-thumb img{width:100%;height:100%;object-fit:cover}
.search-thumb svg{width:100%;height:100%;display:block}
.search-info{flex:1;min-width:0}
.search-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-addr{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-rede{font-size:9px;padding:1px 6px;border-radius:99px;margin-top:3px;display:inline-block}
.search-check{font-size:14px;color:var(--green);flex-shrink:0}
.search-empty{text-align:center;padding:2rem 1rem;color:var(--faint);font-size:12px;line-height:1.7}

/* DESTAQUES */
.cards-h{display:flex;gap:10px;padding:0 1rem .75rem;overflow-x:auto}
.cards-h::-webkit-scrollbar{display:none}
.dest-card{width:130px;flex-shrink:0;cursor:pointer;border-radius:10px;overflow:hidden;background:var(--s2);border:.5px solid var(--faint);transition:opacity .15s}
.dest-card:active{opacity:.75}
.dest-poster{width:100%;height:100px;overflow:hidden;position:relative}
.dest-poster img{width:100%;height:100%;object-fit:cover}
.dest-poster svg{width:100%;height:100%;display:block}
.dest-info{padding:6px 8px 8px}
.dest-name{font-size:11px;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dest-meta{font-size:9px;color:var(--muted)}
.dest-rating{color:var(--gold);font-size:9px}
.dest-empty{font-size:11px;color:var(--faint);padding:.5rem 1rem 1rem;text-align:center}

/* HUNTER */
.franchise-list{padding:0 1rem;display:flex;flex-direction:column;gap:8px;padding-bottom:1rem}
.franchise-card{background:var(--s2);border-radius:12px;border:.5px solid var(--faint);overflow:hidden;cursor:pointer;transition:opacity .15s}
.franchise-card:active{opacity:.75}
.franchise-head{display:flex;align-items:center;gap:12px;padding:10px 12px}
.franchise-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.franchise-info{flex:1;min-width:0}
.franchise-name{font-size:13px;font-weight:500;color:var(--text)}
.franchise-count{font-size:10px;color:var(--muted);margin-top:1px}
.franchise-progress{height:3px;background:var(--faint);border-radius:99px;margin:0 12px 10px}
.franchise-prog-fill{height:3px;border-radius:99px;transition:width .4s}
.franchise-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.franchise-pct{font-size:13px;font-weight:500}
.franchise-check{font-size:16px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.5rem;color:var(--faint);font-size:12px;text-align:center;line-height:1.8}
.empty-ico{font-size:32px;margin-bottom:8px;opacity:.3}

/* MODAL */
.modal-back{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:50;display:flex;flex-direction:column;justify-content:flex-end}
.modal-tap{flex:1;cursor:pointer}
.msheet{background:var(--s1);border-radius:18px 18px 0 0;max-height:86%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
.mhandle{width:36px;height:4px;background:var(--faint);border-radius:99px;margin:10px auto}
.mhead{padding:.75rem 1.25rem 0;text-align:center}
.mtitle{font-family:Georgia,serif;font-size:16px;font-weight:700;color:var(--text)}
.msub{font-size:11px;color:var(--muted);margin-top:3px}
.mposter{width:100px;height:150px;border-radius:8px;overflow:hidden;margin:.875rem auto;position:relative}
.mposter img{width:100%;height:100%;object-fit:cover}
.mposter svg{width:100%;height:100%;display:block}
.mribbon{position:absolute;top:9px;left:-20px;background:var(--green);color:#0f1117;font-size:8px;font-weight:700;padding:2px 24px;transform:rotate(-45deg)}
.mactions{display:flex;justify-content:space-around;padding:.75rem 1.25rem;border-top:.5px solid var(--faint);border-bottom:.5px solid var(--faint)}
.mact{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:4px 8px}
.mact-ico{font-size:20px;color:var(--muted);transition:color .15s}
.mact-ico.aw{color:var(--green)}
.mact-ico.al{color:#e05}
.mact-lbl{font-size:10px;color:var(--muted)}
.mbody{padding:.875rem 1.25rem}
.msec{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.vcrow{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-radius:10px;padding:.75rem 1rem;margin-bottom:.875rem}
.vcnum{font-size:20px;font-weight:500;color:var(--text)}
.vclbl{font-size:10px;color:var(--muted)}
.vcctrl{display:flex;gap:8px}
.vcbtn{width:32px;height:32px;border-radius:50%;border:.5px solid var(--faint);background:transparent;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}
.vcbtn:disabled{opacity:.3}
.vcbtn.p{border-color:var(--green);color:var(--green)}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.clbl{font-size:12px;color:var(--muted);width:80px;flex-shrink:0}
.srow{display:flex;gap:3px}
.sbtn{font-size:20px;background:none;border:none;cursor:pointer;color:var(--faint);padding:0}
.sbtn.lit{color:var(--gold)}
.notea{width:100%;background:var(--s2);border:.5px solid var(--faint);border-radius:10px;padding:8px 10px;font-size:12px;font-family:inherit;color:var(--text);resize:none;outline:none;min-height:56px;margin-top:.875rem}
.notea::placeholder{color:var(--faint)}
.notea:focus{border-color:var(--green)}

/* CONQUISTAS */
.ach-prog{background:var(--s2);border-radius:12px;padding:.875rem;margin:0 1rem .875rem}
.ach-prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ach-prog-title{font-size:13px;font-weight:500;color:var(--text)}
.ach-prog-pct{font-size:12px;color:var(--green)}
.ach-bar{height:5px;background:var(--faint);border-radius:99px}
.ach-bar-fill{height:5px;background:var(--gold);border-radius:99px;transition:width .4s}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 1rem 1rem}
.ach-card{background:var(--s2);border-radius:12px;padding:.875rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;border:.5px solid var(--faint)}
.ach-card.unlocked{border-color:var(--gold)}
.ach-ico{font-size:26px}
.ach-card:not(.unlocked) .ach-ico{filter:grayscale(1) opacity(.2)}
.ach-name{font-size:12px;font-weight:500;color:var(--faint)}
.ach-card.unlocked .ach-name{color:var(--text)}
.ach-desc{font-size:10px;color:var(--faint);line-height:1.4}
.ach-sec{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:0 1rem .625rem}

.toast{position:absolute;bottom:72px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--green);color:#0f1117;padding:9px 18px;border-radius:99px;font-size:12px;font-weight:700;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;z-index:999;pointer-events:none;box-shadow:0 4px 20px rgba(74,222,128,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
.retry-btn{margin-top:10px;padding:8px 18px;background:#DA291C;color:white;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.divider{height:.5px;background:var(--faint);margin:0 1rem .75rem}

/* dica coluna imagem */
.img-tip{background:var(--s2);border:.5px solid var(--faint);border-radius:10px;padding:.875rem 1rem;margin:.75rem 1rem 0;font-size:11px;color:var(--muted);line-height:1.6}
.img-tip strong{color:var(--text)}
.img-tip code{font-family:monospace;font-size:10px;background:var(--bg);padding:1px 5px;border-radius:4px;color:var(--green)}
</style>
</head>
<body>
<div class="shell">
  <div class="notch"></div>
  <div id="screen" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative"></div>
  <div class="toast" id="toast"></div>
</div>
<script>
const SHEET_URL="https://script.google.com/macros/s/AKfycby6EAv-R5WmGMtMKYn5bpXxBIrk1ygLR72xKvczyD9fyI5f7hlOdBJb9ily0U_rfzFC/exec";
const VERSION="1.2.0";

const BC={"mcdonald's":"#DA291C","burger king":"#F5821F","bob's":"#003087","kfc":"#e4002b","subway":"#009B48","pizzaria":"#cc3300","hamburgueria":"#8B4513","bar":"#7c3aed","outro":"#4ade80"};
const BB={"mcdonald's":"#1a0000","burger king":"#1a0800","bob's":"#00081a","kfc":"#1a0000","subway":"#001a00","pizzaria":"#1a0800","hamburgueria":"#0f0800","bar":"#0a0014","outro":"#0f1117"};
const BI={"mcdonald's":"✦","burger king":"♨","bob's":"◈","kfc":"☖","subway":"≋","pizzaria":"✿","hamburgueria":"☀","bar":"◉","outro":"◎"};
const BEMOJI={"mcdonald's":"🍔","burger king":"👑","bob's":"🧃","kfc":"🍗","subway":"🥖","pizzaria":"🍕","hamburgueria":"🍔","bar":"🍺","outro":"🍽️"};

function bk(r){return(r||"outro").toLowerCase().trim()}
function bc(r){return BC[bk(r)]||"#4ade80"}
function bb(r){return BB[bk(r)]||"#0f1117"}
function bi(r){return BI[bk(r)]||"◎"}
function bemoji(r){return BEMOJI[bk(r)]||"🍽️"}

const LOGO=`<svg class="logo-svg" viewBox="0 0 18 26" xmlns="http://www.w3.org/2000/svg"><line x1="9" y1="1" x2="9" y2="15" stroke="#e8eaed" stroke-width="2.2" stroke-linecap="round"/><line x1="4" y1="1" x2="4" y2="8" stroke="#e8eaed" stroke-width="2.2" stroke-linecap="round"/><line x1="14" y1="1" x2="14" y2="8" stroke="#e8eaed" stroke-width="2.2" stroke-linecap="round"/><path d="M4 8 Q9 13 14 8" fill="none" stroke="#e8eaed" stroke-width="2.2" stroke-linecap="round"/><line x1="9" y1="15" x2="9" y2="25" stroke="#e8eaed" stroke-width="2.2" stroke-linecap="round"/><circle cx="9" cy="20" r="3.2" fill="#4ade80"/></svg>`;

let S={nav:"home",v:{},rat:{},notes:{},likes:{},ach:{},modal:null,restaurants:[],loading:false,loadError:false,lastLoaded:null,query:""};

function sk(k,v){try{localStorage.setItem("garfado_"+k,JSON.stringify(v))}catch(e){}}
function lk(k,d){try{const r=localStorage.getItem("garfado_"+k);return r!==null?JSON.parse(r):d}catch{return d}}
function saveLocal(){sk("v",S.v);sk("rat",S.rat);sk("notes",S.notes);sk("likes",S.likes);sk("ach",S.ach)}
function loadLocal(){S.v=lk("v",{});S.rat=lk("rat",{});S.notes=lk("notes",{});S.likes=lk("likes",{});S.ach=lk("ach",{})}

function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600)}

async function fetchRestaurants(spin=true){
  if(spin){S.loading=true;S.loadError=false;render();}
  const btn=document.getElementById("reload-btn");
  if(btn)btn.classList.add("spinning");
  try{
    const res=await fetch(SHEET_URL);
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();
    S.restaurants=data.filter(r=>r.nome).map((r,i)=>({
      id:i,
      name:String(r.nome||"").trim(),
      addr:String(r.endereco||"").trim(),
      rede:String(r.rede||"Outro").trim(),
      hours:String(r.horario||"–").trim(),
      rating:r.nota?parseFloat(r.nota):null,
      // coluna "imagem" opcional — URL direta da foto
      img:String(r.imagem||"").trim()||null,
    }));
    S.loading=false;S.loadError=false;S.lastLoaded=new Date();
    toast("✓ "+S.restaurants.length+" restaurantes carregados!");
  }catch(e){
    S.loading=false;S.loadError=true;
  }
  render();
  const btn2=document.getElementById("reload-btn");
  if(btn2)btn2.classList.remove("spinning");
}

/* ── POSTER SVG fallback ── */
function mkSVG(r){
  const col=bc(r.rede),bg=bb(r.rede),ico=bi(r.rede);
  const nm=r.name.length>14?r.name.slice(0,13)+"…":r.name;
  const ad=r.addr.length>17?r.addr.slice(0,16)+"…":r.addr;
  return`<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="300" fill="${bg}"/>
    <text x="100" y="145" text-anchor="middle" font-family="Arial" font-size="58" fill="${col}" opacity="0.13">${ico}</text>
    <rect x="0" y="202" width="200" height="98" fill="rgba(0,0,0,0.76)"/>
    <text x="11" y="230" font-family="Georgia,serif" font-size="16" font-weight="700" fill="#e8eaed">${nm}</text>
    <text x="11" y="250" font-family="Arial" font-size="10" fill="#99aabb">${ad}</text>
    ${r.rating?`<text x="11" y="270" font-family="Arial" font-size="10" fill="#FFC72C">★ ${r.rating}</text>`:""}
    ${r.hours&&r.hours!=="–"?`<text x="189" y="270" text-anchor="end" font-family="Arial" font-size="9" fill="#4ade80">${r.hours}</text>`:""}
  </svg>`;
}

function mkSVGSmall(r){
  const col=bc(r.rede),bg=bb(r.rede),ico=bi(r.rede);
  const nm=r.name.length>13?r.name.slice(0,12)+"…":r.name;
  return`<svg viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="130" fill="${bg}"/>
    <text x="100" y="72" text-anchor="middle" font-family="Arial" font-size="42" fill="${col}" opacity="0.14">${ico}</text>
    <rect x="0" y="88" width="200" height="42" fill="rgba(0,0,0,0.78)"/>
    <text x="10" y="108" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#e8eaed">${nm}</text>
    ${r.rating?`<text x="10" y="124" font-family="Arial" font-size="9" fill="#FFC72C">★ ${r.rating}</text>`:""}
  </svg>`;
}

/* renderiza o poster: imagem real se tiver, SVG se não */
function mkPoster(r){
  if(r.img){
    return`<img class="poster-img" src="${r.img}" alt="${r.name}" onerror="this.style.display='none';this.nextSibling.style.display='block'"/>
    <div style="display:none;width:100%;height:100%">${mkSVG(r)}</div>
    <div class="pw-label"><div class="pw-label-name">${r.name}</div></div>`;
  }
  return mkSVG(r);
}

function mkPosterSmall(r){
  if(r.img){
    return`<img src="${r.img}" alt="${r.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='${mkSVGSmall(r).replace(/'/g,"\\'")}'"/>`;
  }
  return mkSVGSmall(r);
}

function mkThumb(r){
  if(r.img){
    return`<img src="${r.img}" alt="${r.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'"/>`;
  }
  return mkSVG(r);
}

const CRIT=["Comida","Atendimento","Limpeza","Banheiro"];
function totVisits(){return Object.values(S.v).reduce((a,b)=>a+b,0)}
function garfCount(){return S.restaurants.filter(r=>(S.v[r.id]||0)>0).length}
function getRedes(){return[...new Set(S.restaurants.map(r=>bk(r.rede)).filter(Boolean))]}

function addVisit(id,d){S.v[id]=Math.max(0,(S.v[id]||0)+d);saveLocal();checkAchs();render()}
function toggleLike(id){S.likes[id]=!S.likes[id];saveLocal();render()}
function setRat(rid,c,v){if(!S.rat[rid])S.rat[rid]={};S.rat[rid][c]=v;saveLocal();checkAchs();renderModal()}
function openModal(id){S.modal=id;render()}
function closeModal(){S.modal=null;render()}
function setNav(n){S.nav=n;S.modal=null;S.query="";render()}
function setQuery(q){S.query=q;renderSearchArea()}

function getSugestoes(){
  return S.restaurants.filter(r=>!(S.v[r.id]>0)).sort((a,b)=>(b.rating||0)-(a.rating||0)).slice(0,8);
}

const ACHS=[
  {id:"first",ico:"🍟",name:"Primeira garfada",desc:"Marque 1 lugar",check:s=>Object.values(s.v).some(v=>v>0)},
  {id:"three",ico:"🗺️",name:"Explorador",desc:"Garfe 3 lugares",check:s=>s.restaurants.filter(r=>(s.v[r.id]||0)>0).length>=3},
  {id:"five",ico:"⭐",name:"Colecionador",desc:"Garfe 5 lugares",check:s=>s.restaurants.filter(r=>(s.v[r.id]||0)>0).length>=5},
  {id:"all",ico:"🏆",name:"Completou!",desc:"Garfe todos os lugares",check:s=>s.restaurants.length>0&&s.restaurants.every(r=>(s.v[r.id]||0)>0)},
  {id:"viciado",ico:"😵",name:"Viciado",desc:"5x no mesmo lugar",check:s=>Math.max(0,...Object.values(s.v).concat(0))>=5},
  {id:"habitue",ico:"👑",name:"Habitué",desc:"10x no mesmo lugar",check:s=>Math.max(0,...Object.values(s.v).concat(0))>=10},
  {id:"20",ico:"🎖️",name:"Devoto",desc:"20 visitas no total",check:s=>Object.values(s.v).reduce((a,b)=>a+b,0)>=20},
  {id:"rated",ico:"📋",name:"Crítico",desc:"Avalie critérios em 3 lugares",check:s=>{let n=0;s.restaurants.forEach(r=>{if(Object.keys(s.rat[r.id]||{}).length>=3)n++});return n>=3}},
  {id:"notes",ico:"✏️",name:"Cronista",desc:"Notas em 3 lugares",check:s=>Object.values(s.notes).filter(n=>n&&n.length>5).length>=3},
  {id:"like",ico:"♥",name:"Favorito",desc:"Curta um lugar",check:s=>Object.values(s.likes).some(Boolean)},
];
function checkAchs(){
  let ch=false;
  ACHS.forEach(a=>{if(!S.ach[a.id]&&a.check(S)){S.ach[a.id]=true;ch=true;setTimeout(()=>toast(a.ico+" "+a.name+" desbloqueada!"),300)}});
  if(ch)saveLocal();
}

function render(){
  const scr=document.getElementById("screen");
  if(S.loading){scr.innerHTML=renderLoading()+renderNav();return;}
  let html="";
  if(S.nav==="home")      html=renderHome();
  else if(S.nav==="dest") html=renderDest();
  else if(S.nav==="hunter")html=renderHunter();
  else if(S.nav==="ach")  html=renderAch();
  html+=renderNav();
  scr.innerHTML=html;
  const ms=document.getElementById("modal-slot");
  if(ms)ms.innerHTML=S.modal!==null?renderModal():"";
  // restaurar foco/valor do search
  const inp=document.getElementById("search-input");
  if(inp&&S.query){inp.value=S.query;document.getElementById("search-clear").classList.add("show");}
}

function renderLoading(){
  return`<div class="loading-screen">
    <svg style="width:52px;height:52px" viewBox="0 0 48 68" xmlns="http://www.w3.org/2000/svg">
      <line x1="24" y1="4" x2="24" y2="38" stroke="#4ade80" stroke-width="6" stroke-linecap="round"/>
      <line x1="10" y1="4" x2="10" y2="20" stroke="#4ade80" stroke-width="6" stroke-linecap="round"/>
      <line x1="38" y1="4" x2="38" y2="20" stroke="#4ade80" stroke-width="6" stroke-linecap="round"/>
      <path d="M10 20 Q24 34 38 20" fill="none" stroke="#4ade80" stroke-width="6" stroke-linecap="round"/>
      <line x1="24" y1="38" x2="24" y2="64" stroke="#4ade80" stroke-width="6" stroke-linecap="round"/>
      <circle cx="24" cy="52" r="9" fill="#4ade80"/>
    </svg>
    <div class="loading-txt">carregando<span class="loading-dots"></span></div>
  </div>`;
}

function renderNav(){
  const tabs=[
    {id:"home",  ico:"⊞", lbl:"visitados"},
    {id:"dest",  ico:"✦", lbl:"destaques"},
    {id:"hunter",ico:"🎯",lbl:"hunter"},
    {id:"ach",   ico:"🏆",lbl:"conquistas"},
  ];
  return`<div class="bnav">${tabs.map(t=>`<button class="bntab${S.nav===t.id?" on":""}" onclick="setNav('${t.id}')"><span class="bnico">${t.ico}</span><span class="bnlbl">${t.lbl}</span></button>`).join("")}</div>`;
}

function renderTopbar(){
  const lastTxt=S.lastLoaded?S.lastLoaded.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"–";
  return`<div class="topbar">
    <div class="logo-row">${LOGO}<span class="wm">garfado</span></div>
    <div class="topbar-right">
      <span class="last-time">${lastTxt}</span>
      <button class="reload-btn" id="reload-btn" onclick="fetchRestaurants(false)">↻</button>
      <span class="ver">v${VERSION}</span>
    </div>
  </div>`;
}

function renderSearchBar(){
  return`<div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="search" placeholder="Buscar por nome ou endereço…"
      value="${S.query}"
      oninput="onSearch(this.value)"
      onkeydown="if(event.key==='Escape'){clearSearch()}"
    />
    <button class="search-clear${S.query?" show":""}" id="search-clear" onclick="clearSearch()">✕</button>
  </div>`;
}

function onSearch(q){
  S.query=q;
  const clr=document.getElementById("search-clear");
  if(clr)clr.classList.toggle("show",!!q);
  renderSearchArea();
}

function clearSearch(){
  S.query="";
  const inp=document.getElementById("search-input");
  if(inp)inp.value="";
  const clr=document.getElementById("search-clear");
  if(clr)clr.classList.remove("show");
  renderSearchArea();
}

function renderSearchArea(){
  const area=document.getElementById("search-area");
  if(!area)return;
  area.innerHTML=S.query?renderSearchResults():renderGridContent();
}

function renderSearchResults(){
  const q=S.query.toLowerCase().trim();
  const hits=S.restaurants.filter(r=>
    r.name.toLowerCase().includes(q)||r.addr.toLowerCase().includes(q)||r.rede.toLowerCase().includes(q)
  );
  if(!hits.length) return`<div class="search-empty">Nenhum resultado para<br><strong>"${S.query}"</strong></div>`;
  const col=r=>bc(r.rede);
  return`<div class="search-results">${hits.map(r=>{
    const v=(S.v[r.id]||0)>0;
    const nb=r.rede.charAt(0).toUpperCase()+r.rede.slice(1).split(" ")[0];
    return`<div class="search-item" onclick="openModal(${r.id})">
      <div class="search-thumb">${mkThumb(r)}</div>
      <div class="search-info">
        <div class="search-name">${r.name}</div>
        <div class="search-addr">${r.addr}</div>
        <span class="search-rede" style="background:${col(r)}22;color:${col(r)};border:.5px solid ${col(r)}44">${nb}</span>
      </div>
      ${v?`<span class="search-check">✓</span>`:`<span style="font-size:12px;color:var(--faint)">◎</span>`}
    </div>`;
  }).join("")}</div>`;
}

function renderGridContent(){
  const visited=S.restaurants.filter(r=>(S.v[r.id]||0)>0);
  if(S.loadError) return`<div class="empty-state"><div class="empty-ico">⚠</div>Não foi possível carregar.<br><button class="retry-btn" onclick="fetchRestaurants()">↻ Tentar novamente</button></div>`;
  if(!visited.length) return`<div class="empty-state"><div class="empty-ico">◎</div>${S.restaurants.length===0?"Nenhum restaurante na planilha ainda.":"Você ainda não garfou nenhum lugar.<br>Explore a aba <strong>destaques</strong>!"}</div>`;
  return`<div class="grid-3">${visited.map(r=>{
    const v=S.v[r.id]||0;
    const vals=Object.values(S.rat[r.id]||{});
    const avg=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
    return`<div class="pw" onclick="openModal(${r.id})">${mkPoster(r)}${v>0?`<div class="pvc">✓</div>`:""}${v>1?`<div class="pvn">${v}x</div>`:""}${avg?`<div class="pmr">★${avg}</div>`:""}</div>`;
  }).join("")}</div>`;
}

/* ── HOME ── */
function renderHome(){
  const garf=garfCount();
  const tot=totVisits();
  const pend=S.restaurants.length-garf;
  return`
    ${renderTopbar()}
    ${renderSearchBar()}
    <div class="scroll-body">
      <div id="search-area">
        <div class="sec-head"><span class="sec-title">Visitados</span><span class="sec-sub">${garf} de ${S.restaurants.length}</span></div>
        <div class="stats-row">
          <div class="stat-pill"><div class="stat-pill-v" style="color:var(--green)">${garf}</div><div class="stat-pill-l">garfados</div></div>
          <div class="stat-pill"><div class="stat-pill-v" style="color:var(--gold)">${pend}</div><div class="stat-pill-l">faltam</div></div>
          <div class="stat-pill"><div class="stat-pill-v">${tot}</div><div class="stat-pill-l">visitas</div></div>
          <div class="stat-pill"><div class="stat-pill-v">${ACHS.filter(a=>S.ach[a.id]).length}</div><div class="stat-pill-l">conquistas</div></div>
        </div>
        <div class="divider"></div>
        ${renderGridContent()}
      </div>
      <div id="modal-slot"></div>
    </div>`;
}

/* ── DESTAQUES ── */
function renderDest(){
  const sugest=getSugestoes();
  const curtidos=S.restaurants.filter(r=>S.likes[r.id]);
  const allList=S.restaurants;

  const sugestH=!sugest.length
    ?`<p class="dest-empty">Você já foi em todos! 🎉</p>`
    :`<div class="cards-h">${sugest.map(r=>`<div class="dest-card" onclick="openModal(${r.id})">
        <div class="dest-poster">${mkPosterSmall(r)}</div>
        <div class="dest-info"><div class="dest-name">${r.name}</div><div class="dest-meta">${r.addr.split(",")[0]}</div>${r.rating?`<div class="dest-rating">★ ${r.rating}</div>`:""}</div>
      </div>`).join("")}</div>`;

  const curtidosH=!curtidos.length
    ?`<p class="dest-empty">Curta um lugar para ver aqui</p>`
    :`<div class="cards-h">${curtidos.map(r=>`<div class="dest-card" onclick="openModal(${r.id})">
        <div class="dest-poster">${mkPosterSmall(r)}</div>
        <div class="dest-info"><div class="dest-name">${r.name}</div><div class="dest-meta">${r.addr.split(",")[0]}</div>${r.rating?`<div class="dest-rating">★ ${r.rating}</div>`:""}</div>
      </div>`).join("")}</div>`;

  return`
    ${renderTopbar()}
    ${renderSearchBar()}
    <div class="scroll-body">
      <div id="search-area">
        <div class="sec-head"><span class="sec-title">Sugestões</span><span class="sec-sub">melhores notas</span></div>
        ${sugestH}
        <div class="divider"></div>
        <div class="sec-head"><span class="sec-title">Curtidos</span><span class="sec-sub">seus favoritos</span></div>
        ${curtidosH}
      </div>
      <div id="modal-slot"></div>
    </div>`;
}

/* ── HUNTER ── */
function renderHunter(){
  const redes=getRedes();
  if(!redes.length) return`${renderTopbar()}${renderSearchBar()}<div class="scroll-body"><div class="empty-state" style="margin-top:3rem"><div class="empty-ico">🎯</div>Nenhuma franquia encontrada.</div></div>`;

  const franchiseH=redes.map(rede=>{
    const todos=S.restaurants.filter(r=>bk(r.rede)===rede);
    const garfados=todos.filter(r=>(S.v[r.id]||0)>0);
    const pct=todos.length?Math.round(garfados.length/todos.length*100):0;
    const col=bc(rede);
    const emoji=bemoji(rede);
    const nomeBonito=rede.charAt(0).toUpperCase()+rede.slice(1);
    const completo=garfados.length===todos.length&&todos.length>0;
    return`<div class="franchise-card" onclick="openFranchise('${rede}')">
      <div class="franchise-head">
        <div class="franchise-icon" style="background:${col}22;border:.5px solid ${col}44">${emoji}</div>
        <div class="franchise-info"><div class="franchise-name">${nomeBonito}</div><div class="franchise-count">${garfados.length} de ${todos.length} filial${todos.length>1?"is":""}</div></div>
        <div class="franchise-right"><div class="franchise-pct" style="color:${completo?"var(--green)":col}">${pct}%</div>${completo?`<div class="franchise-check">✓</div>`:""}</div>
      </div>
      <div class="franchise-progress"><div class="franchise-prog-fill" style="width:${pct}%;background:${completo?"var(--green)":col}"></div></div>
    </div>`;
  }).join("");

  const redesCompletas=redes.filter(rede=>{const t=S.restaurants.filter(r=>bk(r.rede)===rede);return t.length>0&&t.every(r=>(S.v[r.id]||0)>0)}).length;

  return`
    ${renderTopbar()}
    ${renderSearchBar()}
    <div class="scroll-body">
      <div id="search-area">
        <div class="sec-head"><span class="sec-title">Hunter</span><span class="sec-sub">${redesCompletas}/${redes.length} completas</span></div>
        <div class="franchise-list">${franchiseH}</div>
      </div>
      <div id="modal-slot"></div>
    </div>`;
}

function openFranchise(rede){
  const todos=S.restaurants.filter(r=>bk(r.rede)===rede);
  const col=bc(rede);
  const nomeBonito=rede.charAt(0).toUpperCase()+rede.slice(1);
  const ms=document.getElementById("modal-slot");
  const listH=todos.map(r=>{
    const v=S.v[r.id]||0;
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--faint);cursor:pointer" onclick="openModal(${r.id})">
      <div style="width:36px;height:54px;border-radius:4px;overflow:hidden;flex-shrink:0;position:relative">${mkThumb(r)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</div>
        <div style="font-size:10px;color:var(--muted)">${r.addr}</div>
        ${r.rating?`<div style="font-size:10px;color:var(--gold)">★ ${r.rating}</div>`:""}
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${v>0?`<div style="width:22px;height:22px;border-radius:50%;background:var(--green);color:#0f1117;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">✓</div>`
             :`<div style="width:22px;height:22px;border-radius:50%;border:1px solid var(--faint)"></div>`}
        ${v>1?`<div style="font-size:9px;color:var(--gold);margin-top:2px">${v}x</div>`:""}
      </div>
    </div>`;
  }).join("");
  ms.innerHTML=`<div class="modal-back"><div class="modal-tap" onclick="closeModal()"></div>
    <div class="msheet"><div class="mhandle"></div>
      <div class="mhead"><div class="mtitle">${nomeBonito}</div><div class="msub">${todos.filter(r=>(S.v[r.id]||0)>0).length} de ${todos.length} garfadas</div></div>
      <div style="padding:.75rem 1.25rem">${listH}</div>
    </div></div>`;
}

/* ── CONQUISTAS ── */
function renderAch(){
  checkAchs();
  const unlocked=ACHS.filter(a=>S.ach[a.id]),locked=ACHS.filter(a=>!S.ach[a.id]);
  const pct=ACHS.length?Math.round(unlocked.length/ACHS.length*100):0;
  const cards=list=>list.map(a=>`<div class="ach-card${S.ach[a.id]?" unlocked":""}"><div class="ach-ico">${a.ico}</div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>`).join("");
  return`
    ${renderTopbar()}
    ${renderSearchBar()}
    <div class="scroll-body">
      <div id="search-area">
        <div class="sec-head"><span class="sec-title">Conquistas</span></div>
        <div class="ach-prog">
          <div class="ach-prog-top"><span class="ach-prog-title">progresso</span><span class="ach-prog-pct">${unlocked.length}/${ACHS.length} · ${pct}%</span></div>
          <div class="ach-bar"><div class="ach-bar-fill" style="width:${pct}%"></div></div>
        </div>
        ${unlocked.length?`<div class="ach-sec">desbloqueadas</div><div class="ach-grid">${cards(unlocked)}</div><div class="ach-sec">bloqueadas</div>`:`<div class="ach-sec">todas as conquistas</div>`}
        <div class="ach-grid">${cards(locked)}</div>
      </div>
      <div id="modal-slot"></div>
    </div>`;
}

/* ── MODAL ── */
function renderModal(){
  if(S.modal===null)return"";
  const r=S.restaurants.find(x=>x.id===S.modal);
  if(!r)return"";
  const v=S.v[r.id]||0,liked=S.likes[r.id],myR=S.rat[r.id]||{},note=S.notes[r.id]||"";
  const critH=CRIT.map(c=>{const cur=myR[c]||0;return`<div class="crow"><span class="clbl">${c}</span><div class="srow">${[1,2,3,4,5].map(n=>`<button class="sbtn${n<=cur?" lit":""}" onclick="setRat(${r.id},'${c}',${n})">★</button>`).join("")}</div>${cur?`<span style="font-size:11px;color:var(--muted);margin-left:5px">${cur}.0</span>`:""}</div>`;}).join("");
  const posterHTML=r.img
    ?`<img src="${r.img}" alt="${r.name}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none';this.nextSibling.style.display='block'"/><div style="display:none;width:100%;height:100%">${mkSVG(r)}</div>`
    :mkSVG(r);
  return`<div class="modal-back"><div class="modal-tap" onclick="closeModal()"></div><div class="msheet">
    <div class="mhandle"></div>
    <div class="mhead"><div class="mtitle">${r.name}</div><div class="msub">${r.addr}${r.hours&&r.hours!=="–"?" · "+r.hours:""}</div></div>
    <div class="mposter">${posterHTML}${v>0?'<div class="mribbon">garfado</div>':""}</div>
    <div class="mactions">
      <button class="mact" onclick="addVisit(${r.id},1)"><span class="mact-ico${v>0?" aw":""}">◎</span><span class="mact-lbl">${v>0?v+"x garfado":"Garfar"}</span></button>
      <button class="mact" onclick="toggleLike(${r.id})"><span class="mact-ico${liked?" al":""}">${liked?"♥":"♡"}</span><span class="mact-lbl">Curtir</span></button>
      <button class="mact" onclick="addVisit(${r.id},-1)"><span class="mact-ico" style="${v>0?"":"opacity:.3"}">−◎</span><span class="mact-lbl">Remover</span></button>
    </div>
    <div class="mbody">
      ${r.rating?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:.875rem"><span style="font-size:17px;font-weight:500;color:var(--text)">${r.rating}</span><span style="color:var(--gold);font-size:13px">${"★".repeat(Math.round(r.rating))}</span><span style="font-size:11px;color:var(--muted)">&nbsp;${r.rating}/5.0</span></div>`:""}
      <div class="vcrow">
        <div><div class="vclbl">minhas visitas</div><div class="vcnum">${v}<span style="font-size:13px;font-weight:400;color:var(--muted)"> vez${v!==1?"es":""}</span></div></div>
        <div class="vcctrl">
          <button class="vcbtn" onclick="addVisit(${r.id},-1)" ${v===0?"disabled":""}>−</button>
          <button class="vcbtn p" onclick="addVisit(${r.id},1)">+</button>
        </div>
      </div>
      <div class="msec">minha avaliação</div>
      ${critH}
      <textarea class="notea" placeholder="Escreva sua impressão..." oninput="S.notes[${r.id}]=this.value;saveLocal()">${note}</textarea>
    </div>
  </div></div>`;
}

loadLocal();
fetchRestaurants();
</script>
</body>
</html>
