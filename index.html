<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Garfado</title>
<link rel="icon" href="data:image/svg+xml,<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'><rect width='100' height='100' rx='22' fill='%230f1117'/><line x1='50' y1='10' x2='50' y2='58' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><line x1='30' y1='10' x2='30' y2='34' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><line x1='70' y1='10' x2='70' y2='34' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><path d='M30 34 Q50 52 70 34' fill='none' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><line x1='50' y1='58' x2='50' y2='88' stroke='%234ade80' stroke-width='10' stroke-linecap='round'/><circle cx='50' cy='73' r='12' fill='%234ade80'/></svg>"/>
<meta name="theme-color" content="#0f1117"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#4ade80;--bg:#0f1117;--s1:#1c2228;--s2:#242c35;--text:#e8eaed;--muted:#99aabb;--faint:#2a3a4a;--gold:#FFC72C}
html,body{height:100%;background:#0a0d10;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-tap-highlight-color:transparent}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.shell{width:100%;max-width:390px;background:var(--bg);border-radius:32px;border:4px solid var(--s1);overflow:hidden;display:flex;flex-direction:column;height:calc(100vh - 32px);max-height:780px;position:relative;box-shadow:0 32px 80px rgba(0,0,0,.6)}
@media(max-width:430px){body{padding:0;align-items:stretch}.shell{max-width:100%;border-radius:0;border:none;height:100vh;max-height:none}}
.notch{width:80px;height:20px;background:var(--s1);border-radius:0 0 14px 14px;margin:0 auto;flex-shrink:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 7px;border-bottom:.5px solid var(--faint);flex-shrink:0}
.logo-row{display:flex;align-items:center;gap:8px}
.logo-svg{width:18px;height:26px}
.wm{font-family:Georgia,serif;font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.5px}
.topbar-right{display:flex;align-items:center;gap:8px}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:17px;padding:4px 6px;border-radius:6px;line-height:1;-webkit-tap-highlight-color:transparent}
.icon-btn.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar-avatar{width:30px;height:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0f1117;overflow:hidden;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.topbar-avatar img{width:100%;height:100%;object-fit:cover}

.search-wrap{padding:8px 12px;border-bottom:.5px solid var(--faint);flex-shrink:0;position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:22px;color:var(--faint);font-size:15px;pointer-events:none}
.search-input{width:100%;background:var(--s2);border:.5px solid var(--faint);border-radius:10px;padding:8px 36px 8px 34px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--green)}
.search-input::placeholder{color:var(--faint)}
.search-clear{position:absolute;right:22px;background:none;border:none;cursor:pointer;color:var(--faint);font-size:16px;padding:4px;display:none}
.search-clear.show{display:block}

/* NAV — pointer-events explícito para garantir clique */
.bnav{display:flex;border-top:.5px solid var(--faint);background:var(--bg);flex-shrink:0;position:relative;z-index:5;padding:4px 6px 6px;gap:2px}
.bntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0 5px;background:none;border:none;cursor:pointer;border-radius:10px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;pointer-events:auto;transition:background .15s}
.bnico{font-size:18px;color:var(--faint);pointer-events:none;transition:color .15s,transform .15s}
.bnlbl{font-size:7px;color:var(--faint);letter-spacing:.3px;pointer-events:none;transition:color .15s}
.bntab.on{background:rgba(74,222,128,.12)}
.bntab.on .bnico{color:var(--green);transform:scale(1.08)}
.bntab.on .bnlbl{color:var(--green)}

.scroll-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.scroll-body::-webkit-scrollbar{display:none}
.sec-head{padding:.875rem 1rem .4rem;display:flex;align-items:baseline;justify-content:space-between}
.sec-title{font-family:Georgia,serif;font-size:15px;font-weight:700;color:var(--text)}
.sec-sub{font-size:10px;color:var(--muted)}

/* GRID */
/* ── POSTER UNIVERSAL: proporção 2:3 em todos os contextos ── */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:0 3px 3px}

/* pw = poster no grid (ocupa célula inteira) */
.pw{position:relative;aspect-ratio:2/3;cursor:pointer;border-radius:6px;overflow:hidden;touch-action:manipulation}
.pw:active{opacity:.75}
.pw svg,.pw img.pi{width:100%;height:100%;object-fit:cover;display:block}

/* pw-md = poster médio: carrosséis e destaques (largura fixa, 2:3) */
.pw-md{position:relative;width:110px;flex-shrink:0;aspect-ratio:2/3;cursor:pointer;border-radius:6px;overflow:hidden;touch-action:manipulation;border:.5px solid var(--faint)}
.pw-md:active{opacity:.75}
.pw-md svg,.pw-md img{width:100%;height:100%;object-fit:cover;display:block}

/* pw-sm = poster pequeno: listas inline (largura fixa, 2:3) */
.pw-sm{position:relative;width:40px;flex-shrink:0;aspect-ratio:2/3;border-radius:4px;overflow:hidden}
.pw-sm svg,.pw-sm img{width:100%;height:100%;object-fit:cover;display:block}

/* overlays comuns */
.pvc{position:absolute;top:4px;right:4px;background:var(--green);color:#0f1117;font-size:8px;font-weight:700;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.pvn{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.8);color:var(--gold);font-size:8px;padding:1px 4px;border-radius:99px;pointer-events:none}
.pmr{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,.8);color:var(--gold);font-size:8px;padding:1px 4px;border-radius:99px;pointer-events:none}
.pw-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 100%);padding:18px 5px 5px;pointer-events:none}
.pw-overlay-name{font-size:9px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pw-overlay-sub{font-size:7px;color:var(--green);margin-top:1px}

/* CHECK-IN CTA */
.checkin-cta{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:6px;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 50%);pointer-events:none}
.checkin-label{font-size:8px;color:var(--green);text-align:center;line-height:1.3;font-weight:500}

/* FRIEND STRIP — usa pw-md */
.friend-strip{display:flex;gap:6px;padding:0 12px 6px;overflow-x:auto}
.friend-strip::-webkit-scrollbar{display:none}
.friend-av-badge{position:absolute;top:4px;left:4px;width:18px;height:18px;border-radius:50%;background:var(--green);font-size:8px;font-weight:700;color:#0f1117;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bg);overflow:hidden;pointer-events:none;z-index:2}
.friend-av-badge img{width:100%;height:100%;object-fit:cover}

/* SEARCH */
.search-results{padding:0 8px}
.search-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;margin-bottom:4px;touch-action:manipulation}
.search-item:active{background:var(--s2)}
.search-thumb{pointer-events:none;flex-shrink:0}
.search-info{flex:1;min-width:0;pointer-events:none}
.search-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-addr{font-size:10px;color:var(--muted);margin-top:1px}
.search-rede{font-size:9px;padding:1px 6px;border-radius:99px;margin-top:3px;display:inline-block}

/* DESTAQUES — carrossel usa pw-md diretamente */
.cards-h{display:flex;gap:8px;padding:0 12px .875rem;overflow-x:auto}
.cards-h::-webkit-scrollbar{display:none}
.pw-md-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.88),transparent);padding:22px 6px 6px;pointer-events:none}
.pw-md-name{font-size:10px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pw-md-meta{font-size:8px;color:#aabbcc;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pw-md-rating{color:var(--gold);font-size:8px;margin-top:1px}

/* HUNTER — pointer-events corretos */
.franchise-list{padding:0 1rem;display:flex;flex-direction:column;gap:8px;padding-bottom:1rem}
.franchise-card{background:var(--s2);border-radius:12px;border:.5px solid var(--faint);overflow:hidden;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:block;width:100%;text-align:left;-webkit-user-select:none;user-select:none}
.franchise-card:active{opacity:.75;background:var(--s1)}
.franchise-head{display:flex;align-items:center;gap:12px;padding:10px 12px;pointer-events:none}
.franchise-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.franchise-info{flex:1;min-width:0}
.franchise-name{font-size:13px;font-weight:500;color:var(--text)}
.franchise-count{font-size:10px;color:var(--muted);margin-top:1px}
.franchise-progress{height:3px;background:var(--faint);border-radius:99px;margin:0 12px 10px}
.franchise-prog-fill{height:3px;border-radius:99px}
.franchise-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.franchise-pct{font-size:13px;font-weight:500}

/* AMIGOS / FEED */
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:10px 1rem;border-bottom:.5px solid var(--faint)}
.feed-avatar{width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0f1117;flex-shrink:0;overflow:hidden;cursor:pointer;touch-action:manipulation}
.feed-avatar img{width:100%;height:100%;object-fit:cover}
.feed-info{flex:1;min-width:0}
.feed-text{font-size:12px;color:var(--text);line-height:1.5}
.feed-name-link{color:var(--green);cursor:pointer;font-weight:600;background:none;border:none;font-size:12px;font-family:inherit;padding:0;touch-action:manipulation}
.feed-time{font-size:10px;color:var(--faint);margin-top:2px}
.feed-thumb{width:32px;aspect-ratio:2/3;border-radius:4px;overflow:hidden;flex-shrink:0;cursor:pointer;touch-action:manipulation}
.feed-thumb img,.feed-thumb svg{width:100%;height:100%;object-fit:cover;display:block}

.follower-row{display:flex;align-items:center;gap:10px;padding:10px 1rem;border-bottom:.5px solid var(--faint)}
.follower-av{width:36px;height:36px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text);overflow:hidden;flex-shrink:0;cursor:pointer;touch-action:manipulation}
.follower-av img{width:100%;height:100%;object-fit:cover}
.follower-info{flex:1;min-width:0;cursor:pointer}
.follower-name{font-size:13px;font-weight:500;color:var(--text)}
.follower-meta{font-size:10px;color:var(--muted)}
.follow-btn{padding:6px 14px;border-radius:99px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500;border:.5px solid var(--green);color:var(--green);background:transparent;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-width:72px}
.follow-btn.following{background:var(--green);color:#0f1117}

.search-user-input{width:100%;background:var(--s2);border:.5px solid var(--faint);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;margin-bottom:8px}
.search-user-input:focus{border-color:var(--green)}
.search-user-input::placeholder{color:var(--faint)}

/* PERFIL */
.profile-hero{padding:1.25rem 1rem 1rem;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.avatar-wrap{position:relative;cursor:pointer}
.avatar-circle{width:72px;height:72px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:28px;font-weight:700;color:#0f1117;overflow:hidden;border:3px solid var(--s2)}
.avatar-circle img{width:100%;height:100%;object-fit:cover}
.avatar-edit-badge{position:absolute;bottom:2px;right:2px;width:22px;height:22px;border-radius:50%;background:var(--s1);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:11px;pointer-events:none}
.profile-name{font-family:Georgia,serif;font-size:17px;font-weight:700;color:var(--text)}
.profile-bio{font-size:11px;color:var(--muted);max-width:220px;line-height:1.5}
.profile-username{font-size:10px;color:var(--faint);margin-top:-4px}
.profile-stats{display:flex;width:100%;margin-top:4px;border-top:.5px solid var(--faint);border-bottom:.5px solid var(--faint)}
.pstat{flex:1;padding:10px 0;text-align:center;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.pstat:active{background:var(--s2)}
.pstat-v{font-size:16px;font-weight:500;color:var(--text)}
.pstat-l{font-size:9px;color:var(--muted);margin-top:1px}
.pstat-d{width:.5px;background:var(--faint)}
.logout-btn{width:calc(100% - 2rem);margin:0 1rem .75rem;padding:10px;background:transparent;border:.5px solid var(--faint);border-radius:10px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;touch-action:manipulation}
.logout-btn:hover,.logout-btn:active{border-color:#e05;color:#e05}

/* AUTH */
.auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center}
.auth-title{font-family:Georgia,serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px;margin-top:1rem}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:2rem;line-height:1.5}
.auth-form{width:100%;display:flex;flex-direction:column;gap:10px}
.auth-input{width:100%;background:var(--s2);border:.5px solid var(--faint);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.auth-input:focus{border-color:var(--green)}
.auth-input::placeholder{color:var(--faint)}
.auth-btn{width:100%;padding:13px;background:var(--green);color:#0f1117;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-family:inherit;margin-top:4px;touch-action:manipulation}
.auth-btn:disabled{opacity:.4;cursor:default}
.auth-switch{font-size:12px;color:var(--muted);margin-top:1rem}
.auth-switch button{background:none;border:none;cursor:pointer;color:var(--green);font-size:12px;font-family:inherit;text-decoration:underline;touch-action:manipulation}
.auth-err{font-size:11px;color:#ff7c7c;text-align:center;min-height:16px}

/* MODAL */
.modal-back{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:50;display:flex;flex-direction:column;justify-content:flex-end}
.modal-tap{flex:1;cursor:pointer}
.msheet{background:var(--s1);border-radius:18px 18px 0 0;max-height:88%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
.mhandle{width:40px;height:4px;background:var(--faint);border-radius:99px;margin:10px auto 0;cursor:grab}
.mhero{width:100%;height:200px;position:relative;overflow:hidden;flex-shrink:0}
.mhero img,.mhero svg{width:100%;height:100%;object-fit:cover;display:block}
.mhero-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,17,23,.95) 0%,rgba(15,17,23,.2) 60%,transparent 100%);pointer-events:none}
.mhero-info{position:absolute;bottom:0;left:0;right:0;padding:.875rem 1.25rem .625rem}
.mhero-title{font-family:Georgia,serif;font-size:18px;font-weight:700;color:#fff;line-height:1.2}
.mhero-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}
.mhero-badge{display:inline-flex;align-items:center;gap:4px;background:var(--green);color:#0f1117;font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;margin-top:6px}
.mactions{display:flex;justify-content:space-around;padding:.625rem 1rem;border-bottom:.5px solid var(--faint);background:var(--s1)}
.mact{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 10px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;border-radius:10px;transition:background .15s}
.mact:active{background:var(--s2)}
.mact-ico{font-size:22px;color:var(--muted);pointer-events:none}
.mact-ico.aw{color:var(--green)}
.mact-ico.al{color:#e05}
.mact-lbl{font-size:10px;color:var(--muted);pointer-events:none}
.mbody{padding:.875rem 1.25rem}
.msec{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.vcrow{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-radius:10px;padding:.75rem 1rem;margin-bottom:.875rem}
.vcnum{font-size:20px;font-weight:500;color:var(--text)}
.vclbl{font-size:10px;color:var(--muted)}
.vcctrl{display:flex;gap:8px}
.vcbtn{width:32px;height:32px;border-radius:50%;border:.5px solid var(--faint);background:transparent;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);touch-action:manipulation}
.vcbtn:disabled{opacity:.3}
.vcbtn.p{border-color:var(--green);color:var(--green)}
.crow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.clbl{font-size:12px;color:var(--muted);width:80px;flex-shrink:0}
.srow{display:flex;gap:3px}
.sbtn{font-size:20px;background:none;border:none;cursor:pointer;color:var(--faint);padding:0;touch-action:manipulation}
.sbtn.lit{color:var(--gold)}
.notea{width:100%;background:var(--s2);border:.5px solid var(--faint);border-radius:10px;padding:8px 10px;font-size:12px;font-family:inherit;color:var(--text);resize:none;outline:none;min-height:56px;margin-top:.875rem}
.notea::placeholder{color:var(--faint)}
.notea:focus{border-color:var(--green)}

/* CHECK-IN MODAL */
.checkin-btn{width:100%;padding:10px;background:transparent;border:.5px solid var(--green);border-radius:8px;font-size:12px;color:var(--green);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:.875rem;touch-action:manipulation}
.checkin-btn:active{background:var(--green);color:#0f1117}
.pending-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--gold);background:rgba(255,199,44,.1);border:.5px solid rgba(255,199,44,.3);padding:2px 8px;border-radius:99px;margin-top:4px}

/* EDIT PROFILE */
.edit-sheet{padding:1.25rem}
.edit-label{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.edit-input{width:100%;background:var(--s2);border:.5px solid var(--faint);border-radius:8px;padding:9px 10px;font-size:13px;color:var(--text);font-family:inherit;outline:none;margin-bottom:.875rem}
.edit-input:focus{border-color:var(--green)}
.edit-save{width:100%;padding:11px;background:var(--green);color:#0f1117;font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-family:inherit;touch-action:manipulation}
.avatar-upload-btn{width:100%;padding:10px;background:var(--s2);border:.5px solid var(--faint);border-radius:8px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;text-align:center;margin-bottom:.875rem;display:flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation}
.avatar-upload-btn:active{border-color:var(--green);color:var(--green)}
.avatar-preview{width:56px;height:56px;border-radius:50%;overflow:hidden;margin:0 auto .875rem;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--text)}
.avatar-preview img{width:100%;height:100%;object-fit:cover}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.5rem;color:var(--faint);font-size:12px;text-align:center;line-height:1.8}
.empty-ico{font-size:32px;margin-bottom:8px;opacity:.3}
.fork-anim{animation:forkStab 1.2s ease-in-out infinite;}
.fork-anim-delay{animation:forkStab 1.2s ease-in-out infinite;animation-delay:.4s;}
.food-bounce{animation:foodPop .6s ease-out forwards;}
@keyframes forkStab{0%,100%{transform:translateY(0) rotate(-15deg)}40%{transform:translateY(18px) rotate(-15deg)}60%{transform:translateY(18px) rotate(-15deg)}80%{transform:translateY(0) rotate(-15deg)}}

/* ── SVG ── */
function wrapText(text, maxChars) {
  // quebra em até 2 linhas para o SVG
  if(text.length<=maxChars) return [text,""];
  const cut=text.lastIndexOf(" ",maxChars);
  const bp=cut>0?cut:maxChars;
  return [text.slice(0,bp), text.slice(bp+1).slice(0,maxChars)+(text.slice(bp+1).length>maxChars?"…":"")];
}
function mkSVG(r){
  const col=bc(r.rede),bg=bb(r.rede),ico=bi(r.rede);
  const [nm1,nm2]=wrapText(r.name,15);
  const addr=r.addr.length>22?r.addr.slice(0,21)+"…":r.addr;
  const rede=r.rede.toLowerCase()==="outro"?"":r.rede.charAt(0).toUpperCase()+r.rede.slice(1);
  const fs1=nm1.length>12?14:nm1.length>8?16:18;
  const fs2=nm2?(nm2.length>12?12:14):14;
  const nameY=nm2?168:180;
  const addrY=nm2?206:200;
  const pílY=nm2?218:213;
  const pílW=Math.max(rede.length*7+20,44);
  return`<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="300" fill="${bg}"/>
    <rect x="0" y="0" width="200" height="300" fill="${col}" opacity="0.08"/>
    <text x="100" y="115" text-anchor="middle" font-family="Arial" font-size="80" fill="${col}" opacity="0.35">${ico}</text>
    <rect x="0" y="145" width="200" height="155" fill="rgba(0,0,0,0.78)"/>
    <line x1="0" y1="146" x2="200" y2="146" stroke="${col}" stroke-width="2" opacity="0.6"/>
    <text x="100" y="${nameY}" text-anchor="middle" font-family="Georgia,serif" font-size="${fs1}" font-weight="700" fill="#ffffff">${nm1}</text>
    ${nm2?`<text x="100" y="190" text-anchor="middle" font-family="Georgia,serif" font-size="${fs2}" font-weight="700" fill="#ffffff">${nm2}</text>`:""}
    <text x="100" y="${addrY}" text-anchor="middle" font-family="Arial" font-size="9" fill="#8899aa">${addr}</text>
    ${rede?`<rect x="${100-pílW/2}" y="${pílY}" width="${pílW}" height="18" rx="9" fill="${col}" opacity="0.35"/><line x1="${100-pílW/2}" y1="${pílY}" x2="${100+pílW/2}" y2="${pílY}" stroke="${col}" stroke-width="0" opacity="0"/><rect x="${100-pílW/2}" y="${pílY}" width="${pílW}" height="18" rx="9" fill="none" stroke="${col}" stroke-width="1" opacity="0.7"/><text x="100" y="${pílY+12.5}" text-anchor="middle" font-family="Arial" font-size="9.5" font-weight="700" fill="${col}">${rede}</text>`:""}
    ${r.rating?`<text x="100" y="288" text-anchor="middle" font-family="Arial" font-size="10" fill="#FFC72C">★ ${r.rating}</text>`:""}
  </svg>`;
}

function mkSVGSm(r){

function poster(r,visits){
  const hasImg=r.img||null;
  // check-in pendente aprovado aparece com imagem
  const src=hasImg;
  if(src) return`<img class="pi" src="${src}" onerror="this.style.display='none'">${mkSVG(r)}`;
  // sem foto: mostra CTA se ninguém visitou ainda
  const noVisit=!visits||Object.keys(visits).every(uid=>!visits[uid]);

    return`${mkSVG(r)}<div class="checkin-cta"><div class="checkin-label">📷 Seja o primeiro<br>a fazer check-in!</div></div>`;
  }
  return mkSVG(r);
}

/* ── DATA LOADING ── */
async function loadData(){
  if(!A.user)return;
  const uid=A.user.id;
  const[vR,rR,lR,aR,fR,folR]=await Promise.all([
    sb.from("visits").select("*").eq("user_id",uid),
    sb.from("ratings").select("*").eq("user_id",uid),
    sb.from("likes").select("*").eq("user_id",uid),
    sb.from("achievements").select("*").eq("user_id",uid),
    sb.from("friendships").select("following_id").eq("follower_id",uid),
    sb.from("friendships").select("follower_id").eq("following_id",uid),
  ]);
  A.visits={};(vR.data||[]).forEach(v=>A.visits[v.restaurant_id]=v.count||1);
  A.ratings={};(rR.data||[]).forEach(r=>{A.ratings[r.restaurant_id]={Comida:r.comida,Atendimento:r.atendimento,Limpeza:r.limpeza,Banheiro:r.banheiro,nota:r.nota};});
  A.likes={};(lR.data||[]).forEach(l=>A.likes[l.restaurant_id]=true);
  A.achs=new Set((aR.data||[]).map(a=>a.achievement_id));
  A.friends=(fR.data||[]).map(f=>f.following_id);
  // BUG FIX: buscar profiles dos seguidores separadamente
  const followerIds=(folR.data||[]).map(f=>f.follower_id).filter(Boolean);
  if(followerIds.length){
    const{data:folProfs}=await sb.from("profiles").select("id,name,username,avatar_url").in("id",followerIds);
    A.followers=folProfs||[];
  }else{A.followers=[];}
  // datas das minhas visitas
  A.visitDates={};
  (vR.data||[]).forEach(v=>{if(v.updated_at)A.visitDates[v.restaurant_id]=v.updated_at;});
  await Promise.all([loadFriendData(),loadRanking(),loadTrending()]);
}

async function loadFriendData(){
  if(!A.friends.length){A.feed=[];A.friendVisits={};return;}
  const[feedR,fvR,rxR,myRxR]=await Promise.all([
    sb.from("visits").select("*, profiles(id,name,username,avatar_url)").in("user_id",A.friends).order("updated_at",{ascending:false}).limit(40),
    sb.from("visits").select("restaurant_id,count,user_id,profiles(name,avatar_url)").in("user_id",A.friends),
    sb.from("reactions").select("feed_key,count").eq("type","fire"),
    A.user?sb.from("reactions").select("feed_key").eq("user_id",A.user.id):Promise.resolve({data:[]}),
  ]);
  A.feed=feedR.data||[];
  A.friendVisits={};
  (fvR.data||[]).forEach(v=>{
    if(!A.friendVisits[v.restaurant_id])A.friendVisits[v.restaurant_id]=[];
    const p=v.profiles||{};
    A.friendVisits[v.restaurant_id].push({name:p.name||"?",avatar:p.avatar_url||null,count:v.count||1,uid:v.user_id});
  });
  // reações agrupadas por feed_key
  A.reactions={};
  (rxR.data||[]).forEach(r=>{A.reactions[r.feed_key]=(A.reactions[r.feed_key]||0)+1;});
  A.myReactions={};
  (myRxR.data||[]).forEach(r=>{A.myReactions[r.feed_key]=true;});
}

async function loadTrending(){
  const weekAgo=new Date(Date.now()-7*24*60*60*1000).toISOString();
  const{data}=await sb.from("visits")
    .select("restaurant_id,count")
    .gte("updated_at",weekAgo)
    .order("count",{ascending:false})
    .limit(8);
  // agrupar por restaurante
  const map={};
  (data||[]).forEach(v=>{
    map[v.restaurant_id]=(map[v.restaurant_id]||0)+(v.count||1);
  });
  A.trending=Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,6)
    .map(([rid,cnt])=>({rid:parseInt(rid),cnt}));
}

async function loadRanking(){
  if(!A.friends.length){A.ranking=[];return;}
  const allIds=[A.user.id,...A.friends];
  const[profR,visR]=await Promise.all([
    sb.from("profiles").select("id,name,username,avatar_url").in("id",allIds),
    sb.from("visits").select("user_id,restaurant_id").in("user_id",allIds),
  ]);
  const profiles=profR.data||[];
  const visitsByUser={};
  (visR.data||[]).forEach(v=>{
    if(!visitsByUser[v.user_id])visitsByUser[v.user_id]=new Set();
    visitsByUser[v.user_id].add(v.restaurant_id);
  });
  A.ranking=profiles.map(p=>({
    profile:p,
    garfCount:(visitsByUser[p.id]||new Set()).size,
    isMe:p.id===A.user.id,
  })).sort((a,b)=>b.garfCount-a.garfCount);
}

/* ── SAVE ── */
async function saveVisit(rid,count){
  if(!A.user)return;
  const r=A.restaurants.find(x=>x.id===rid);if(!r)return;
  const now=new Date().toISOString();
  if(count===0){
    await sb.from("visits").delete().eq("user_id",A.user.id).eq("restaurant_id",rid);
    delete A.visitDates[rid];
  }else{
    if(!A.visitDates[rid])A.visitDates[rid]=now; // guarda primeira visita
    await sb.from("visits").upsert({user_id:A.user.id,restaurant_id:rid,restaurant_name:r.name,restaurant_rede:r.rede,count,updated_at:now},{onConflict:"user_id,restaurant_id"});
  }
}
async function saveLike(rid,v){if(!A.user)return;if(v)await sb.from("likes").upsert({user_id:A.user.id,restaurant_id:rid});else await sb.from("likes").delete().eq("user_id",A.user.id).eq("restaurant_id",rid);}
async function saveRating(rid,field,val){
  if(!A.user)return;
  const mr=A.ratings[rid]||{};
  const pl={user_id:A.user.id,restaurant_id:rid,comida:mr.Comida||null,atendimento:mr.Atendimento||null,limpeza:mr.Limpeza||null,banheiro:mr.Banheiro||null,nota:mr.nota||null,updated_at:new Date().toISOString()};
  pl[field.toLowerCase()]=val;
  await sb.from("ratings").upsert(pl,{onConflict:"user_id,restaurant_id"});
}
async function saveNote(rid,nota){
  if(!A.user)return;
  const mr=A.ratings[rid]||{};
  await sb.from("ratings").upsert({user_id:A.user.id,restaurant_id:rid,comida:mr.Comida||null,atendimento:mr.Atendimento||null,limpeza:mr.Limpeza||null,banheiro:mr.Banheiro||null,nota,updated_at:new Date().toISOString()},{onConflict:"user_id,restaurant_id"});
}
async function saveAch(id){if(!A.user)return;await sb.from("achievements").upsert({user_id:A.user.id,achievement_id:id},{onConflict:"user_id,achievement_id"});}

/* ── AVATAR ── */
async function handleAvatarFile(input){
  const file=input.files[0];if(!file)return;
  if(file.size>3*1024*1024){toast("⚠ Foto deve ter menos de 3MB");return;}
  const reader=new FileReader();
  reader.onload=e=>{A.pendingAvatar=e.target.result;render();};
  reader.readAsDataURL(file);
}
function triggerAvatarUpload(){document.getElementById("avatar-file-input").click();}
async function uploadBase64(dataUrl,path){
  if(!dataUrl)return null;
  try{
    const res=await fetch(dataUrl),blob=await res.blob();
    const{error}=await sb.storage.from("avatars").upload(path,blob,{upsert:true,contentType:blob.type});
    if(error)return dataUrl; // fallback: usa base64 diretamente
    const{data}=sb.storage.from("avatars").getPublicUrl(path);
    return data.publicUrl+"?t="+Date.now();
  }catch{return dataUrl;}
}

/* ── CHECK-IN FOTO ── */
async function handleCheckinFile(input){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast("⚠ Foto deve ter menos de 5MB");return;}
  const reader=new FileReader();
  reader.onload=e=>{A.pendingCheckin=e.target.result;render();};
  reader.readAsDataURL(file);
}
function triggerCheckin(rid){A.checkinRid=rid;document.getElementById("checkin-file-input").click();}
async function submitCheckin(){
  if(!A.pendingCheckin||A.checkinRid===null)return;
  toast("Enviando check-in para aprovação…");
  // Salva no supabase storage como "pendente" — você aprova manualmente depois
  const path=`checkins/${A.checkinRid}_${A.user.id}_${Date.now()}.jpg`;
  await uploadBase64(A.pendingCheckin,path);
  A.pendingCheckin=null;A.checkinRid=null;
  toast("✓ Check-in enviado! Aguardando aprovação.");
  render();
}

function showAchTooltip(id){
  const a=ADEFS.find(x=>x.id===id);if(!a)return;
  const unlocked=A.achs.has(id);
  // mini toast com nome e descrição
  const t=document.getElementById("toast");if(!t)return;
  if(toastTimer){clearTimeout(toastTimer);t.classList.remove("show");}
  requestAnimationFrame(()=>{
    t.innerHTML=`<span style="font-size:14px">${a.ico}</span> <span>${a.name}</span> <span style="font-weight:400;opacity:.7">· ${a.desc}</span>`;
    t.classList.add("show");
    toastTimer=setTimeout(()=>{t.classList.remove("show");t.textContent="";toastTimer=null;},3000);
  });
}

async function loadReviews(rid){
  const{data}=await sb.from("reviews")
    .select("*, profiles(name,avatar_url)")
    .eq("restaurant_id",rid)
    .order("created_at",{ascending:false})
    .limit(20);
  A.reviews[rid]=(data||[]).map(r=>({
    id:r.id,user_id:r.user_id,
    text:r.text,
    name:r.profiles?.name||"Anônimo",
    avatar:r.profiles?.avatar_url||null,
    created_at:r.created_at
  }));
  // atualizar só a lista sem re-renderizar o modal inteiro
  const listEl=document.getElementById("reviews-list-"+rid);
  if(!listEl)return;
  const revs=A.reviews[rid]||[];
  if(!revs.length){listEl.innerHTML='<div style="font-size:11px;color:var(--faint);text-align:center;padding:.5rem 0">Seja o primeiro a deixar um review!</div>';return;}
  listEl.innerHTML=revs.map(rv=>{
    const ini=(rv.name||"?").charAt(0).toUpperCase();
    const isMe=rv.user_id===A.user?.id;
    return`<div style="background:var(--s2);border-radius:10px;padding:10px 12px;border:.5px solid var(--faint)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="width:24px;height:24px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0f1117;overflow:hidden;flex-shrink:0">${rv.avatar?`<img src="${rv.avatar}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">${ini}`:ini}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:500;color:var(--text)">${rv.name}</div>
          <div style="font-size:9px;color:var(--faint)">${tAgo(rv.created_at)}</div>
        </div>
        ${isMe?`<button onclick="deleteReview('${rv.id}',${rid})" type="button" style="background:none;border:none;cursor:pointer;color:var(--faint);font-size:13px;padding:2px;touch-action:manipulation">✕</button>`:""}
      </div>
      <div style="font-size:12px;color:var(--text);line-height:1.5">${rv.text}</div>
    </div>`;
  }).join("");
}

async function submitReview(rid){
  const inp=document.getElementById("review-input");
  if(!inp)return;
  const text=inp.value.trim();
  if(!text||text.length<3){toast("⚠ Escreva pelo menos 3 caracteres");return;}
  const{error}=await sb.from("reviews").insert({
    user_id:A.user.id,restaurant_id:rid,text
  });
  if(error){toast("⚠ Erro ao enviar review");return;}
  inp.value="";
  toast("✓ Review publicado!");
  loadReviews(rid);

function initPullRefresh(scrollId){
  const el=document.getElementById(scrollId);if(!el)return;
  let startY=0,pulling=false,indicator=null;
  el.addEventListener("touchstart",e=>{if(el.scrollTop===0){startY=e.touches[0].clientY;pulling=true;}},{passive:true});
  el.addEventListener("touchmove",e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY;
    if(dy>0&&dy<80){
      if(!indicator){indicator=document.createElement("div");indicator.style.cssText="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;padding:10px;font-size:12px;color:var(--muted);background:var(--bg);z-index:10;pointer-events:none";indicator.textContent="↓ Solte para atualizar";el.parentElement.style.position="relative";el.parentElement.appendChild(indicator);}
      indicator.textContent=dy>56?"↑ Atualizando…":"↓ Solte para atualizar";
      indicator.style.opacity=dy/56;
    }
  },{passive:true});
  el.addEventListener("touchend",e=>{
    if(!pulling)return;pulling=false;
    const dy=e.changedTouches[0].clientY-startY;
    if(indicator){indicator.remove();indicator=null;}
    if(dy>56){toast("↻ Atualizando…");fetchRestaurants(false);}
  },{passive:true});
}

function initSwipe(){
  const sheet=document.querySelector(".msheet");if(!sheet)return;
  let startY=0,dragging=false;
  sheet.addEventListener("touchstart",e=>{startY=e.touches[0].clientY;dragging=true;},{passive:true});
  sheet.addEventListener("touchmove",e=>{
    if(!dragging)return;const dy=e.touches[0].clientY-startY;
    if(dy>0&&sheet.scrollTop<=0){sheet.style.transform=`translateY(${dy}px)`;sheet.style.transition="none";}
  },{passive:true});
  sheet.addEventListener("touchend",e=>{
    if(!dragging)return;dragging=false;const dy=e.changedTouches[0].clientY-startY;
    sheet.style.transition="transform .3s ease";
    if(dy>100)closeModal();else sheet.style.transform="translateY(0)";
  },{passive:true});
}

async function fetchPlacePhoto(r){
  if(!r||!r.name)return null;
  if(A.placesCache[r.id]!==undefined)return A.placesCache[r.id];
  try{
    // Text Search para achar o place_id
    const query=encodeURIComponent(r.name+" "+r.addr.split(",")[0]+" Brasil");
    const tsUrl=`https://maps.googleapis.com/maps/api/place/textsearch/json?query=${query}&key=${GPLACES_KEY}&language=pt-BR&region=br`;
    // Places API via proxy não é possível direto — usar Place Search com fetch via campo fields
    // Usar Places API (New) com endpoint correto
    const resp=await fetch(`https://places.googleapis.com/v1/places:searchText`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "X-Goog-Api-Key":GPLACES_KEY,
        "X-Goog-FieldMask":"places.id,places.photos,places.displayName"
      },
      body:JSON.stringify({textQuery:r.name+" "+r.addr.split(",")[0],languageCode:"pt-BR",regionCode:"BR",maxResultCount:1})
    });
    const data=await resp.json();
    const place=data.places?.[0];
    if(!place||!place.photos||!place.photos.length){A.placesCache[r.id]=null;return null;}
    // Pegar URL da primeira foto
    const photoName=place.photos[0].name;
    const photoUrl=`https://places.googleapis.com/v1/${photoName}/media?maxHeightPx=600&maxWidthPx=400&key=${GPLACES_KEY}`;
    A.placesCache[r.id]=photoUrl;
    return photoUrl;
  }catch(e){A.placesCache[r.id]=null;return null;}
}

async function enrichRestaurantPhoto(r){
  if(r.img)return; // já tem foto
  const url=await fetchPlacePhoto(r);
  if(url){
    // Atualizar no array em memória
    const idx=A.restaurants.findIndex(x=>x.id===r.id);
    if(idx>=0)A.restaurants[idx].img=url;
    render();
  }
}

// Buscar restaurante pelo Google Places e adicionar ao app
async function searchGooglePlaces(query){
  if(!query||query.length<2)return[];
  try{
    const resp=await fetch(`https://places.googleapis.com/v1/places:searchText`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "X-Goog-Api-Key":GPLACES_KEY,
        "X-Goog-FieldMask":"places.id,places.displayName,places.formattedAddress,places.photos,places.rating,places.types"
      },
      body:JSON.stringify({textQuery:query+" restaurante Brasil",languageCode:"pt-BR",regionCode:"BR",maxResultCount:5,
        includedType:"restaurant"})
    });
    const data=await resp.json();
    return(data.places||[]).map(p=>({
      placeId:p.id,
      name:p.displayName?.text||"",
      addr:p.formattedAddress||"",
      rating:p.rating||null,
      photo:p.photos?.[0]?`https://places.googleapis.com/v1/${p.photos[0].name}/media?maxHeightPx=600&maxWidthPx=400&key=${GPLACES_KEY}`:null
    }));
  }catch(e){return[];}
}

function rSearchRes(){
  const q=A.query.toLowerCase();

  if(!hits.length)return`<div style="text-align:center;padding:2rem 1rem;color:var(--faint);font-size:12px">Nenhum resultado para "<strong>${A.query}</strong>"</div>`;
  return`<div class="search-results">${hits.map(r=>{const v=(A.visits[r.id]||0)>0,col=bc(r.rede),nb=r.rede.charAt(0).toUpperCase()+r.rede.slice(1).split(" ")[0];return`<div class="search-item" onclick="openModal(${r.id})"><div class="pw-sm search-thumb">${posterPlain(r)}</div><div class="search-info"><div class="search-name">${r.name}</div><div class="search-addr">${r.addr}</div><span class="search-rede" style="background:${col}22;color:${col};border:.5px solid ${col}44">${nb}</span></div>${v?`<span style="color:var(--green);font-size:16px;pointer-events:none">✓</span>`:`<span style="color:var(--faint);font-size:14px;pointer-events:none">◎</span>`}</div>`;}).join("")}</div>`;

/* strip de amigos */
function rFriendStrip(){
  const cands=A.restaurants.filter(r=>!(A.visits[r.id]>0)&&friendsWho(r.id).length>0).sort((a,b)=>friendsWho(b.id).length-friendsWho(a.id).length).slice(0,10);

    return`<div class="pw-md" onclick="openModal(${r.id})" style="cursor:pointer;touch-action:manipulation">

function rMainContent(){
  const vis=A.restaurants.filter(r=>(A.visits[r.id]||0)>0);

/* ── HUNTER — clique corrigido com onclick direto ── */
function rHunter(){
  const redes=getRedes();
  if(!redes.length)return`${rMainTopbar()}${rSearch()}<div class="scroll-body"><div class="empty-state" style="margin-top:3rem"><div class="empty-ico">🎯</div>Adicione redes conhecidas com múltiplas filiais.</div></div>`;
  const rc=redes.filter(rede=>{const t=A.restaurants.filter(r=>bk(r.rede)===rede);return t.length>0&&t.every(r=>(A.visits[r.id]||0)>0)}).length;
  const fH=redes.map(function(rede,idx){
    const todos=A.restaurants.filter(r=>bk(r.rede)===rede);
    const gf=todos.filter(r=>(A.visits[r.id]||0)>0);
    const pct=todos.length?Math.round(gf.length/todos.length*100):0;
    const col=bc(rede),emoji=be(rede),nome=rede.charAt(0).toUpperCase()+rede.slice(1);
    const ok=gf.length===todos.length&&todos.length>0;
    // onclick no elemento raiz, sem pointer-events:none nos filhos
    return`<button class="franchise-card" onclick="openFr(${idx})" type="button">
      <div class="franchise-head">
        <div class="franchise-icon" style="background:${col}22;border:.5px solid ${col}44">${emoji}</div>
        <div class="franchise-info"><div class="franchise-name">${nome}</div><div class="franchise-count">${gf.length} de ${todos.length} filial${todos.length>1?"is":""}</div></div>
        <div class="franchise-right"><div class="franchise-pct" style="color:${ok?"var(--green)":col}">${pct}%</div>${ok?`<div style="font-size:16px">✓</div>`:""}</div>
      </div>
      <div class="franchise-progress"><div class="franchise-prog-fill" style="width:${pct}%;background:${ok?"var(--green)":col}"></div></div>
    </button>`;
  }).join("");
  return`${rMainTopbar()}${rSearch()}
    <div class="scroll-body"><div id="search-area">
      <div class="sec-head"><span class="sec-title">Hunter</span><span class="sec-sub">${rc}/${redes.length} completas</span></div>
      <div class="franchise-list">${fH}</div>
    </div><div id="modal-slot"></div></div>`;
}
function openFr(idx){
  const rede=getRedes()[idx];if(!rede)return;
  const todos=A.restaurants.filter(r=>bk(r.rede)===rede),nome=rede.charAt(0).toUpperCase()+rede.slice(1);
  const ms=document.getElementById("modal-slot");if(!ms)return;
  const lH=todos.map(r=>{const v=A.visits[r.id]||0;return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--faint);cursor:pointer;touch-action:manipulation" onclick="openModal(${r.id})"><div class="pw-sm" style="pointer-events:none">${posterPlain(r)}</div><div style="flex:1;min-width:0;pointer-events:none"><div style="font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</div><div style="font-size:10px;color:var(--muted)">${r.addr}</div>${r.rating?`<div style="font-size:10px;color:var(--gold)">★ ${r.rating}</div>`:""}</div>${v>0?`<div style="width:22px;height:22px;border-radius:50%;background:var(--green);color:#0f1117;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:none">✓</div>`:`<div style="width:22px;height:22px;border-radius:50%;border:1px solid var(--faint);pointer-events:none"></div>`}</div>`;}).join("");
  ms.innerHTML=`<div class="modal-back"><div class="modal-tap" onclick="closeModal()"></div><div class="msheet"><div class="mhandle"></div><div class="mhead"><div class="mtitle">${nome}</div><div class="msub">${todos.filter(r=>(A.visits[r.id]||0)>0).length} de ${todos.length} garfadas</div></div><div style="padding:.75rem 1.25rem">${lH}</div></div></div>`;
  setTimeout(()=>initSwipe(),50);
}

        const ini=(u.name||"?").charAt(0).toUpperCase(),isF=A.friends.includes(u.id);

          <div class="follower-av" onclick="viewUserProfile('${u.id}')">${u.avatar_url?`<img src="${u.avatar_url}" onerror="this.style.display='none'">${ini}`:ini}</div>
          <div class="follower-info" onclick="viewUserProfile('${u.id}')">
            <div class="follower-name">${u.name||"Sem nome"}</div>
            <div class="follower-meta">@${u.username||"?"}</div>
          </div>
          <button class="follow-btn${isF?" following":""}" onclick="toggleFollow('${u.id}')" type="button">${isF?"Seguindo":"Seguir back"}</button>
        </div>`;
      }).join("");

  const pessoasH=`
    <div style="padding:10px 1rem 6px">
      <input class="search-user-input" placeholder="🔍  Buscar por nome ou @username…" oninput="searchUsers(this.value)" style="margin-bottom:6px"/>

    </div>

  // ── TABS INTERNAS ──
  const tabs=[{id:"feed",l:"Feed 📰"},{id:"ranking",l:"Ranking 🏅"},{id:"pessoas",l:"Pessoas 👥"}];
  const tabBar=`<div style="display:flex;border-bottom:.5px solid var(--faint);flex-shrink:0;background:var(--bg)">
    ${tabs.map(t=>`<button onclick="setAmigosTab('${t.id}')" type="button" style="flex:1;padding:9px 0 8px;background:none;border:none;border-bottom:2px solid ${AMIGOS_TAB===t.id?"var(--green)":"transparent"};margin-bottom:-.5px;font-size:12px;color:${AMIGOS_TAB===t.id?"var(--green)":"var(--muted)"};cursor:pointer;font-family:inherit;font-weight:${AMIGOS_TAB===t.id?"500":"400"};touch-action:manipulation;letter-spacing:.2px">${t.l}</button>`).join("")}
  </div>`;

  let bodyH="";
  if(AMIGOS_TAB==="feed")bodyH=feedH;
  else if(AMIGOS_TAB==="ranking")bodyH=rankH;
  else bodyH=pessoasH;

  return`${rMainTopbar()}
    ${tabBar}
    <div class="scroll-body" id="main-scroll">
      ${bodyH}
      <div id="modal-slot"></div>
    </div>`;
}

function rProfileSubview(view){
  let title="",content="";
  if(view==="garfados"){
    title=`Garfados (${garfCount()})`;
    const vis=A.restaurants.filter(r=>(A.visits[r.id]||0)>0);
    content=vis.length?`<div class="grid-3" style="padding:3px">${vis.map(r=>{const v=A.visits[r.id]||0,c=r.img?`<img class="pi" src="${r.img}" onerror="this.style.display='none'">${mkSVG(r)}<div class="pw-overlay"><div class="pw-overlay-name">${r.name}</div></div>`:mkSVG(r);return`<div class="pw" onclick="openModal(${r.id})">${c}<div class="pvc">✓</div>${v>1?`<div class="pvn">${v}x</div>`:""}</div>`;}).join("")}</div>`:`<div class="empty-state"><div class="empty-ico">◎</div>Nenhum lugar garfado ainda.</div>`;
  }else if(view==="conquistas"){
    title=`Conquistas (${A.achs.size}/${ADEFS.length})`;
    const ul=ADEFS.filter(a=>A.achs.has(a.id)),lk=ADEFS.filter(a=>!A.achs.has(a.id));
    const cards=list=>list.map(a=>`<div style="background:var(--s2);border-radius:12px;padding:.875rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;border:.5px solid ${A.achs.has(a.id)?"var(--gold)":"var(--faint)"}"><div style="font-size:26px;filter:${A.achs.has(a.id)?"none":"grayscale(1) opacity(.2)"}">${a.ico}</div><div style="font-size:12px;font-weight:500;color:${A.achs.has(a.id)?"var(--text)":"var(--faint)"}">${a.name}</div><div style="font-size:10px;color:var(--faint);line-height:1.4">${a.desc}</div></div>`).join("");
    content=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 1rem 1rem">${cards(ul)}${cards(lk)}</div>`;
  }else if(view==="seguindo"){
    title=`Seguindo (${A.friends.length})`;
    content=`<div id="seguindo-list"><div class="empty-state"><div class="empty-ico">⏳</div>Carregando…</div></div>`;
    if(A.friends.length){
      sb.from("profiles").select("*").in("id",A.friends).then(({data})=>{
        const el=document.getElementById("seguindo-list");if(!el)return;
        el.innerHTML=(data||[]).map(u=>{const ini=(u.name||"?").charAt(0).toUpperCase(),isF=A.friends.includes(u.id);return`<div class="follower-row"><div class="follower-av" onclick="viewUserProfile('${u.id}')">${u.avatar_url?`<img src="${u.avatar_url}" onerror="this.style.display='none'">${ini}`:ini}</div><div class="follower-info" onclick="viewUserProfile('${u.id}')"><div class="follower-name">${u.name||"Sem nome"}</div><div class="follower-meta">@${u.username||"?"}</div></div><button class="follow-btn${isF?" following":""}" onclick="toggleFollow('${u.id}')" type="button">${isF?"Seguindo":"Seguir"}</button></div>`;}).join("")||`<div class="empty-state"><div class="empty-ico">👥</div>Você não segue ninguém.</div>`;
      });
    }else{content=`<div class="empty-state"><div class="empty-ico">👥</div>Você não segue ninguém ainda.</div>`;}
  }else if(view==="seguidores"){
    title=`Seguidores (${A.followers.length})`;
    content=!A.followers.length?`<div class="empty-state"><div class="empty-ico">👥</div>Ninguém te segue ainda.</div>`:`<div style="">${A.followers.map(u=>{const ini=(u.name||"?").charAt(0).toUpperCase(),isF=A.friends.includes(u.id);return`<div class="follower-row"><div class="follower-av" onclick="viewUserProfile('${u.id}')">${u.avatar_url?`<img src="${u.avatar_url}" onerror="this.style.display='none'">${ini}`:ini}</div><div class="follower-info" onclick="viewUserProfile('${u.id}')"><div class="follower-name">${u.name||"Sem nome"}</div><div class="follower-meta">@${u.username||"?"}</div></div><button class="follow-btn${isF?" following":""}" onclick="toggleFollow('${u.id}')" type="button">${isF?"Seguindo":"Seguir"}</button></div>`;}).join("")}</div>`;
  }
  return`${rTopbarSimple(title,"A.profileView=null;render()")}
    <div class="scroll-body">
      <div id="profile-list-content">${content}</div>
      <div id="modal-slot"></div>
    </div>`;
}

/* ── MODAL RESTAURANTE ── */
const CRIT=["Comida","Atendimento","Limpeza","Banheiro"];
function rModal(){
  if(A.modal===null)return"";
  const r=A.restaurants.find(x=>x.id===A.modal);if(!r)return"";
  const v=A.visits[r.id]||0,garfado=v>0,liked=A.likes[r.id],mr=A.ratings[r.id]||{},note=mr.nota||"";
  const firstVisit=A.visitDates[r.id]?new Date(A.visitDates[r.id]).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"}):null;
  const cH=CRIT.map(c=>{const cur=mr[c]||0;return`<div class="crow"><span class="clbl">${c}</span><div class="srow">${[1,2,3,4,5].map(n=>`<button class="sbtn${n<=cur?" lit":""}" onclick="setRat(${r.id},'${c}',${n})" type="button">★</button>`).join("")}</div>${cur?`<span style="font-size:11px;color:var(--muted);margin-left:5px">${cur}.0</span>`:""}</div>`;}).join("");
  const fw=friendsWho(r.id);
  const fwH=fw.length?`<div style="margin-bottom:.875rem"><div class="msec">amigos que foram</div><div style="display:flex;gap:6px;flex-wrap:wrap">${fw.map(f=>{const ini=(f.name||"?").charAt(0).toUpperCase();return`<div style="display:flex;align-items:center;gap:5px;background:var(--s2);border-radius:99px;padding:4px 8px 4px 4px;cursor:pointer;touch-action:manipulation" onclick="viewUserProfile('${f.uid}')"><div style="width:20px;height:20px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#0f1117;overflow:hidden;pointer-events:none">${f.avatar?`<img src="${f.avatar}" style="width:100%;height:100%;object-fit:cover">`:ini}</div><span style="font-size:10px;color:var(--text);pointer-events:none">${f.name.split(" ")[0]}</span></div>`;}).join("")}</div></div>`:"";

  // poster do modal — sem foto mostra CTA de check-in
  let posterContent;
  if(r.img){
    posterContent=`<img src="${r.img}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display='none'">${mkSVG(r)}`;
  }else if(A.pendingCheckin&&A.checkinRid===r.id){
    posterContent=`<img src="${A.pendingCheckin}" style="width:100%;height:100%;object-fit:cover;display:block"/>`;
  }else{
    posterContent=mkSVG(r);
  }

  const checkinSection=!r.img?`
    ${A.pendingCheckin&&A.checkinRid===r.id
      ?`<button class="checkin-btn" onclick="submitCheckin()" type="button">✓ Enviar foto para aprovação</button><button style="width:100%;padding:8px;background:transparent;border:none;font-size:11px;color:var(--faint);cursor:pointer;font-family:inherit;touch-action:manipulation" onclick="A.pendingCheckin=null;A.checkinRid=null;render()" type="button">Cancelar</button>`
      :`<button class="checkin-btn" onclick="triggerCheckin(${r.id})" type="button">📷 Seja o primeiro a fazer check-in aqui!</button>`
    }`:""

  return`<div class="modal-back"><div class="modal-tap" onclick="closeModal()"></div><div class="msheet">
    <div class="mhero">${posterContent}
      <div class="mhero-overlay">
        <div class="mhero-title">${r.name}</div>
        <div class="mhero-sub">${r.addr}${r.hours&&r.hours!=="–"?" · "+r.hours:""}</div>
      </div>
      ${garfado?'<div class="mhero-ribbon">✓ garfado</div>':""}
      <button onclick="closeModal()" type="button" style="position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation">×</button>
    </div>
    <div class="mhandle" style="margin-top:8px"></div>
    <div class="mactions">
      <button class="mact" onclick="addVisit(${r.id},1)" type="button"><span class="mact-ico${garfado?" aw":""}">◎</span><span class="mact-lbl">${garfado?"+ visita":"Garfar"}</span></button>
      <button class="mact" onclick="toggleLike(${r.id})" type="button"><span class="mact-ico${liked?" al":""}">${liked?"♥":"♡"}</span><span class="mact-lbl">Favorito</span></button>
      <button class="mact" onclick="addVisit(${r.id},-1)" type="button"><span class="mact-ico" style="${v>0?"":"opacity:.3"}">−◎</span><span class="mact-lbl">Remover</span></button>
    </div>
    <div class="mbody">
      ${r.rating?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:.875rem"><span style="font-size:17px;font-weight:500;color:var(--text)">${r.rating}</span><span style="color:var(--gold);font-size:13px">${"★".repeat(Math.round(r.rating))}</span><span style="font-size:11px;color:var(--muted)">&nbsp;${r.rating}/5.0</span></div>`:""}
      <div class="vcrow">
        <div><div class="vclbl">minhas visitas</div><div class="vcnum">${v}<span style="font-size:13px;font-weight:400;color:var(--muted)"> vez${v!==1?"es":""}</span></div></div>
        <div class="vcctrl">
          <button class="vcbtn" onclick="addVisit(${r.id},-1)" ${v===0?"disabled":""} type="button">−</button>
          <button class="vcbtn p" onclick="addVisit(${r.id},1)" type="button">+</button>
        </div>
      </div>
      ${firstVisit?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:.875rem;font-size:11px;color:var(--muted)"><span>📅</span><span>Primeira visita em <strong style="color:var(--text)">${firstVisit}</strong></span></div>`:""}
      ${fwH}
      ${checkinSection}
      <div class="msec">minha avaliação</div>${cH}
      <textarea class="notea" placeholder="Nota privada (só você vê)..." oninput="setNote(${r.id},this.value)">${note}</textarea>
      <div style="height:.5px;background:var(--faint);margin:1rem 0"></div>
      <div class="msec">reviews públicos</div>
      <div id="reviews-section-${r.id}">
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input id="review-input" placeholder="Escreva um review público…" style="flex:1;background:var(--s2);border:.5px solid var(--faint);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);font-family:inherit;outline:none" onkeydown="if(event.key==='Enter')submitReview(${r.id})"/>
          <button onclick="submitReview(${r.id})" type="button" style="padding:8px 12px;background:var(--green);color:#0f1117;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;touch-action:manipulation">↑</button>
        </div>
        <div id="reviews-list-${r.id}" style="display:flex;flex-direction:column;gap:8px">
          <div style="font-size:11px;color:var(--faint);text-align:center;padding:.5rem 0">Carregando reviews…</div>
        </div>
      </div>
    </div>
  </div></div>`;
}

function showAchTooltip(id){
  const a=ADEFS.find(x=>x.id===id);if(!a)return;
  const unlocked=A.achs.has(id);
  const ms=document.getElementById("modal-slot");if(!ms)return;
  ms.innerHTML=`<div class="modal-back" onclick="closeModal()"><div class="modal-tap"></div>
    <div class="msheet" style="padding:1.25rem">
      <div class="mhandle"></div>
      <div style="display:flex;align-items:center;gap:14px;padding:.75rem 0">
        <div style="width:52px;height:52px;border-radius:14px;background:var(--s2);border:.5px solid ${unlocked?"var(--gold)":"var(--faint)"};display:flex;align-items:center;justify-content:center;font-size:28px;filter:${unlocked?"none":"grayscale(1) opacity(.3)"};flex-shrink:0">${a.ico}</div>
        <div>
          <div style="font-family:Georgia,serif;font-size:16px;font-weight:700;color:${unlocked?"var(--text)":"var(--faint)"}">${a.name}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">${a.desc}</div>
          <div style="margin-top:6px;font-size:11px;font-weight:500;color:${unlocked?"var(--green)":"var(--faint)"}">${unlocked?"✓ Desbloqueada":"Bloqueada"}</div>
        </div>
      </div>
    </div>
  </div>`;
}

/* ── INIT ── */
(async()=>{
  A.loadingApp=true;render();
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    A.user=session.user;
    const{data:prof}=await sb.from("profiles").select("*").eq("id",A.user.id).single();
    A.profile=prof;
    if(!prof||!prof.username)A.onboarding=true;
    await Promise.all([loadData(),fetchRestaurants(false)]);
  }
  A.loadingApp=false;render();
  sb.auth.onAuthStateChange(async(ev,session)=>{
    if(ev==="SIGNED_IN"&&session){
      A.user=session.user;
      const{data:prof}=await sb.from("profiles").select("*").eq("id",A.user.id).single();
      A.profile=prof;
      // onboarding: pedir username se não tem ainda
      if(!prof||!prof.username)A.onboarding=true;
      render();
      await Promise.all([loadData(),fetchRestaurants(false)]);render();
    }
    if(ev==="SIGNED_OUT"){A.user=null;A.profile=null;render();}
  });
})();
</script>
